VM_ISO_LINK="https://mirror-master.dragonflybsd.org/iso-images/dfly-x86_64-6.4.0_REL.iso.bz2"
VM_OS_NAME="dragonflybsd"
VM_SSH_PORT=2226


VM_RELEASE=6.4.0

VM_SHUTDOWN_CMD="/sbin/shutdown -p now"

VM_INSTALL_CMD="pkg install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="fusefs-sshfs"
VM_PRE_INSTALL_PKGS="tree rsync fusefs-sshfs"

VM_DISK="ide"


VM_LOGIN_TAG="logi"

VM_OPTS="conf/dragonflybsd-6.4.0.opts.txt"

# sshfs is NOT offered on DragonFlyBSD: the sshfs (FUSE) mount is read-only in
# practice -- the guest can READ the shared dir, but writing a file back into
# the mount fails ("echo: write error on stdout"). Use rsync/scp/nfs instead.
VM_SYNC_METHODS="rsync,scp,nfs"
